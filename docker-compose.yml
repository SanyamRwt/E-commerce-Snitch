services:
  backend:
    build: ./Backend

    ports:
      - "3000:3000"

    env_file:
      - ./Backend/.env

  frontend:
    build: ./Frontend

    ports:
      - "5173:5173"

  db:
    image: mongo:latest

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: