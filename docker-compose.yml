services:
  backend:
    build: ./Backend

    env_file:
      - ./Backend/.env

    depends_on:
      - db

  frontend:
    build: ./Frontend

    depends_on:
      - backend

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
      - backend

  db:
    image: mongo:latest

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: